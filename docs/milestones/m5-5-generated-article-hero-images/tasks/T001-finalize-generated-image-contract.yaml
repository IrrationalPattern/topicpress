    - "Architecture boundary consistency."
    - "OpenAI docs evidence and model verification requirement."
    - "Docs-only scope."

failure_handling:
  if_blocked:
    - "Set status to blocked."
    - "Document unresolved product, provider, storage, or review-gate question."
  if_qa_fails:
    - "Set status to qa_failed."
    - "Record QA finding IDs and fix planning artifacts before implementation starts."

completion:
