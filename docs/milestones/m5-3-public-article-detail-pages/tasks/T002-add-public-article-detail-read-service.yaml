id: "T002"
title: "Add public article detail read service"

type: "backend"

milestone: "m5-3-public-article-detail-pages"
target_milestone: "m5-3-public-article-detail-pages"
status: "qa_passed"

owner: "implementation"
actor: "backend_developer"
assigned_role: "backend_developer"

priority: "high"
risk: "medium"

related_specs:
  - "docs/PROJECT_STATE.md"
  - "docs/architecture/overview.md"
  - "docs/architecture/boundaries.md"
  - "docs/database/schema.md"
  - "docs/milestones/m5-3-public-article-detail-pages/plan.md"

related_issues: []

depends_on:
  - "T001"

blocks:
  - "T003"

parallel_group: "B"

parallelization:
  can_run_in_parallel: false
  parallel_safety_notes:
    - "Frontend route work consumes the service and DTO produced here."
  conflict_check_required: true
  conflict_check_fields:
    - "depends_on"
    - "blocks"
    - "write_scope.allowed_paths"
    - "contracts.required_existing"
    - "contracts.may_update"

input_context:
  must_read:
    - "AGENTS.md"
    - "docs/PROJECT_STATE.md"
    - "docs/milestones/m5-3-public-article-detail-pages/plan.md"
    - "docs/milestones/m5-3-public-article-detail-pages/task-graph.yaml"
    - "docs/milestones/m5-3-public-article-detail-pages/tasks/T001-finalize-article-detail-contract.yaml"
  should_read:
    - "docs/architecture/adr/ADR-001-monorepo-split-runtime.md"
    - "docs/architecture/adr/ADR-006-database-backed-worker-execution.md"
    - "docs/database/schema.md"
    - "apps/worker/src/public-homepage/"
    - "apps/worker/src/public-category-listing/"
  relevant_docs:
    - "docs/architecture/boundaries.md"
  relevant_files:
    - "apps/worker/src/public-homepage/types.ts"
    - "apps/worker/src/public-homepage/service.ts"
    - "apps/worker/src/public-homepage/drizzle-store.ts"
    - "apps/worker/src/public-category-listing/types.ts"
    - "apps/worker/src/public-category-listing/service.ts"
    - "apps/worker/src/public-category-listing/drizzle-store.ts"
    - "apps/worker/src/index.ts"
  do_not_read_initially: []

write_scope:
  mode: "bounded"
  allowed_paths:
    - "apps/worker/src/public-article-detail/"
    - "apps/worker/src/public-article-detail.ts"
    - "apps/worker/src/index.ts"
    - "apps/worker/test/public-article-detail.test.mjs"
    - "docs/milestones/m5-3-public-article-detail-pages/handoffs/"
  forbidden_paths:
    - "apps/web/"
    - "packages/db/src/schema/"
    - "supabase/"
  notes:
    - "Return to Architect before any schema, migration, AI, generation, review, or publishing changes."

scope:
  include:
    - "Add a read-only public article detail service using the existing worker public read-service pattern."
    - "Return a narrow serialized DTO for one public article or `not_found`."
    - "Filter to `published` articles with non-null `published_at`."
    - "Require active category rows for category-associated articles."
    - "Resolve requested-locale fields with default-locale fallback."
    - "Reject articles missing usable public slug, title, excerpt, or body after fallback."
    - "Return `alternateSlugs` for supported locales that can resolve the same public article."
    - "Add focused backend tests for found, fallback, and not-found cases."
    - "Export the service through the worker package facade used by web."
  exclude:
    - "Database schema or migration changes."
    - "State-changing worker behavior."
    - "Public route or React component implementation."
    - "Sitemap, robots, archive, or structured data."
    - "Source attribution joins or DTO fields unless Architect explicitly reopens that scope."

expected_changes:
  code:
    required: true
    paths:
      - "apps/worker/src/public-article-detail/"
      - "apps/worker/src/public-article-detail.ts"
      - "apps/worker/src/index.ts"
  tests:
    required: true
    paths:
      - "apps/worker/test/public-article-detail.test.mjs"
  docs:
    required: true
    paths:
      - "docs/milestones/m5-3-public-article-detail-pages/handoffs/T002-add-public-article-detail-read-service-handoff.md"
  config:
    required: false
    paths: []

contracts:
  required_existing:
    - "docs/milestones/m5-3-public-article-detail-pages/plan.md"
    - "docs/milestones/m5-3-public-article-detail-pages/handoffs/T001-finalize-article-detail-contract-handoff.md"
  may_update:
    - "apps/worker/src/index.ts"
    - "apps/worker/src/public-article-detail.ts"
    - "apps/worker/src/public-article-detail/"
    - "apps/worker/test/public-article-detail.test.mjs"
  must_not_update:
    - "packages/db/src/schema/"
    - "supabase/"

acceptance_criteria:
  - "A public article detail service returns `found` for a qualifying published article."
  - "The service returns `not_found` for unsupported locale, invalid slug, unknown slug, unpublished status, null `published_at`, inactive category, and missing required fields after fallback."
  - "Requested-locale localization takes precedence over default-locale fallback."
  - "Default-locale fallback is covered for required public fields."
  - "`alternateSlugs` contains only supported locales with usable slugs for the same public article."
  - "No state-changing worker, AI, review, publish, ingestion, schema, or migration behavior changes are made."
  - "Worker tests cover the service contract."

validation:
  commands: []
  package_commands:
    - "pnpm --filter @topicpress/worker test"
    - "pnpm --filter @topicpress/worker build"
  manual_checks:
    - "Confirm exported DTO contains only public-safe serialized fields."
    - "Confirm no raw database rows leak across the service boundary."
    - "Confirm no source-attribution scope was introduced."

handoff:
  required: true
  file: "docs/milestones/m5-3-public-article-detail-pages/handoffs/T002-add-public-article-detail-read-service-handoff.md"

qa:
  required: true
  reviewer_role: "qa_reviewer"
  focus_areas:
    - "Published-only filtering."
    - "Fallback semantics."
    - "DTO shape and public safety."
    - "No schema or state mutation."

failure_handling:
  if_blocked:
    - "Set status to blocked."
    - "Document whether the blocker is slug policy, schema capability, or missing test fixture support."
    - "Return to Architect for scope expansion if schema changes appear necessary."
  if_qa_fails:
    - "Set status to qa_failed."
    - "Record QA finding IDs."
    - "Create a bounded backend fix task."

completion:
  required_outputs:
    - "Code changes"
    - "Tests"
    - "Validation evidence"
    - "Handoff file"
  status_after_agent_finishes: "implemented"
  status_after_qa_passes: "qa_passed"

notes:
  - "Follow the style of `public-homepage` and `public-category-listing` rather than creating a new shared package in this slice."
