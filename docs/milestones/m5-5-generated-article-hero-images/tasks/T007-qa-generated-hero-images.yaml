  conflict_check_required: true

input_context:
  must_read:
    - "AGENTS.md"
    - "docs/PROJECT_STATE.md"
    - "docs/milestones/m5-5-generated-article-hero-images/plan.md"
    - "docs/milestones/m5-5-generated-article-hero-images/task-graph.yaml"
    - "docs/milestones/m5-5-generated-article-hero-images/handoffs/T002-add-hero-image-candidate-data-model-handoff.md"
    - "docs/milestones/m5-5-generated-article-hero-images/handoffs/T003-add-openai-image-provider-handoff.md"
    - "docs/milestones/m5-5-generated-article-hero-images/handoffs/T004-generate-and-store-hero-image-candidate-handoff.md"
    - "docs/milestones/m5-5-generated-article-hero-images/handoffs/T005-review-approval-and-publish-gate-handoff.md"
    - "docs/milestones/m5-5-generated-article-hero-images/handoffs/T006-editorial-review-image-ui-handoff.md"
