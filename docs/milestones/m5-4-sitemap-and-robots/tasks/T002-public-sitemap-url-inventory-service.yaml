id: "T002"
title: "Add public sitemap URL inventory service"

type: "backend"

milestone: "m5-4-sitemap-and-robots"
target_milestone: "m5-4-sitemap-and-robots"
status: "qa_passed"

owner: "implementation"
actor: "backend_developer"
assigned_role: "backend_developer"

priority: "high"
risk: "high"

related_specs:
  - "docs/PROJECT_STATE.md"
  - "docs/architecture/overview.md"
  - "docs/architecture/boundaries.md"
  - "docs/frontend/routes.md"
  - "docs/milestones/m5-4-sitemap-and-robots/plan.md"

related_issues: []

depends_on:
  - "T001"

blocks:
  - "T003"
  - "T004"

parallel_group: "B"

parallelization:
  can_run_in_parallel: false
  parallel_safety_notes:
    - "Frontend endpoint work consumes the service and DTO produced here."
  conflict_check_required: true
  conflict_check_fields:
    - "depends_on"
    - "blocks"
    - "write_scope.allowed_paths"
    - "contracts.required_existing"
    - "contracts.may_update"

input_context:
  must_read:
    - "AGENTS.md"
    - "docs/PROJECT_STATE.md"
    - "docs/milestones/m5-4-sitemap-and-robots/plan.md"
    - "docs/milestones/m5-4-sitemap-and-robots/task-graph.yaml"
    - "docs/milestones/m5-4-sitemap-and-robots/tasks/T001-finalize-sitemap-robots-contract.yaml"
    - "docs/milestones/m5-4-sitemap-and-robots/handoffs/T001-finalize-sitemap-robots-contract-handoff.md"
  should_read:
    - "docs/architecture/adr/ADR-001-monorepo-split-runtime.md"
    - "docs/architecture/adr/ADR-005-manual-review-before-publication.md"
    - "docs/architecture/adr/ADR-006-database-backed-worker-execution.md"
    - "docs/database/schema.md"
    - "apps/worker/src/public-category-listing/"
    - "apps/worker/src/public-article-detail/"
  relevant_docs:
    - "docs/architecture/boundaries.md"
    - "docs/frontend/routes.md"
  relevant_files:
    - "apps/worker/src/public-category-listing/service.ts"
    - "apps/worker/src/public-article-detail/service.ts"
    - "apps/worker/src/public-article-detail/drizzle-store.ts"
    - "apps/worker/test/public-article-detail.test.mjs"
    - "apps/worker/src/index.ts"
    - "packages/config/src/index.ts"
  do_not_read_initially: []

write_scope:
  mode: "bounded"
  allowed_paths:
      - "apps/worker/src/public-sitemap/"
      - "apps/worker/src/public-sitemap.ts"
      - "apps/worker/src/public-article-detail/"
      - "apps/worker/src/index.ts"
      - "apps/worker/package.json"
      - "apps/worker/test/public-sitemap.test.mjs"
      - "apps/worker/test/public-article-detail.test.mjs"
      - "docs/milestones/m5-4-sitemap-and-robots/handoffs/"
  forbidden_paths:
    - "apps/web/"
    - "packages/db/src/schema/"
    - "supabase/"
  notes:
    - "Return to Architect before any schema, migration, AI, generation, review, publishing, or deployment config changes."

scope:
  include:
    - "Add a read-only public sitemap inventory service using the existing worker public read-service pattern."
    - "Return path-level DTOs for active category URLs and public article detail URLs."
    - "Filter article entries to `published` articles with non-null `published_at`."
    - "Require active category rows and active configured taxonomy for category/article entries."
    - "Resolve article URL slugs using the M5.3 requested-locale/default-locale fallback and alternate slug semantics."
    - "Extract or reuse worker-only M5.3 public article detail eligibility helpers so sitemap URL eligibility cannot drift from detail-route eligibility."
    - "Omit invalid or ambiguous article URLs instead of guessing."
    - "Add focused backend tests for homepage-derived assumptions, active categories, found articles, fallback articles, and exclusion cases."
    - "Wire new focused tests into the worker package test script if not already covered."
    - "Export the service through the worker package facade used by web."
  exclude:
    - "Database schema or migration changes."
    - "State-changing worker behavior."
    - "Public route or React/Next endpoint implementation."
    - "Robots generation."
    - "Archive, structured data, pagination, sitemap indexes, source attribution, or related content."

expected_changes:
  code:
    required: true
    paths:
      - "apps/worker/src/public-sitemap/"
      - "apps/worker/src/public-sitemap.ts"
      - "apps/worker/src/public-article-detail/"
      - "apps/worker/src/index.ts"
  tests:
    required: true
    paths:
      - "apps/worker/test/public-sitemap.test.mjs"
      - "apps/worker/test/public-article-detail.test.mjs"
      - "apps/worker/package.json"
  docs:
    required: true
    paths:
      - "docs/milestones/m5-4-sitemap-and-robots/handoffs/T002-public-sitemap-url-inventory-service-handoff.md"
  config:
    required: false
    paths: []

contracts:
  required_existing:
    - "docs/milestones/m5-4-sitemap-and-robots/plan.md"
    - "docs/milestones/m5-4-sitemap-and-robots/handoffs/T001-finalize-sitemap-robots-contract-handoff.md"
  may_update:
    - "apps/worker/src/public-sitemap/"
    - "apps/worker/src/public-sitemap.ts"
    - "apps/worker/src/public-article-detail/"
    - "apps/worker/src/index.ts"
    - "apps/worker/package.json"
    - "apps/worker/test/public-sitemap.test.mjs"
  must_not_update:
    - "apps/web/"
    - "packages/db/src/schema/"
    - "supabase/"

acceptance_criteria:
  - "The service returns active category path records only for active configured categories with active database rows."
  - "The service returns article path records only for durable `published` articles with non-null `published_at`."
  - "The service omits inactive-category, unpublished, null-`published_at`, incomplete, invalid-slug, and ambiguous article URL candidates."
  - "Article path records match the M5.3 article detail fallback/alternate slug policy for supported locales."
  - "Article URL eligibility is implemented through extracted/reused worker-only M5.3 detail-route helper logic unless a documented blocker requires exact mirrored logic."
  - "Returned DTOs are serialized public-safe path records, not raw database rows."
  - "No state-changing worker, AI, review, publish, ingestion, schema, migration, or web route changes are made."
  - "Worker tests cover the service contract and are included in `pnpm --filter @topicpress/worker test`."

validation:
  commands: []
  package_commands:
    - "pnpm --filter @topicpress/worker test"
    - "pnpm --filter @topicpress/worker build"
  manual_checks:
    - "Confirm exported DTO contains only public-safe serialized fields."
    - "Confirm no raw database rows leak across the service boundary."
    - "Confirm public article detail behavior remains covered after any helper extraction."
    - "Confirm no schema or state mutation was introduced."

handoff:
  required: true
  file: "docs/milestones/m5-4-sitemap-and-robots/handoffs/T002-public-sitemap-url-inventory-service-handoff.md"

qa:
  required: true
  reviewer_role: "qa_reviewer"
  focus_areas:
    - "Published-only filtering."
    - "Fallback and alternate slug semantics."
    - "DTO shape and public safety."
    - "No schema or state mutation."

failure_handling:
  if_blocked:
    - "Set status to blocked."
    - "Document whether the blocker is slug policy, canonical URL source of truth, schema capability, or missing test fixture support."
    - "Return to Architect for scope expansion if schema changes appear necessary."
  if_qa_fails:
    - "Set status to qa_failed."
    - "Record QA finding IDs."
    - "Create a bounded backend fix task."

completion:
  required_outputs:
    - "Code changes"
    - "Tests"
    - "Validation evidence"
    - "Handoff file"
  status_after_agent_finishes: "implemented"
  status_after_qa_passes: "qa_passed"

notes:
  - "T001 resolved the helper question: prefer extracting or reusing worker-only M5.3 article detail eligibility helpers. If extraction is blocked, document why and prove exact mirrored behavior with tests."
