acceptance_criteria:
  - "Canonical origin behavior is explicit, including whether the current production placeholder may be used for local QA."
  - "Robots environment mapping is explicit or the milestone is blocked with a clear question."
  - "Sitemap route families and exclusions are explicit."
  - "Article URL eligibility, fallback, invalid-slug, and ambiguity behavior are explicit."
  - "Open questions are resolved or converted into blockers before T002/T003 start."
  - "No production code, package code, or database files are edited."
  - "A handoff records task goal, scope, dependencies, acceptance criteria, decisions, and any changes made."

resolved_contract:
  canonical_origin:
    source_of_truth: "siteConfig.identity.domains.productionOriginPlaceholder"
    local_qa_placeholder_allowed: true
    notes:
      - "Local, test, and staging QA may emit https://ai-landscape-brief.example because non-production robots output is noindex,nofollow."
      - "Do not use localOrigin, NEXT_PUBLIC_SITE_URL, request hosts, or localhost as sitemap/robots canonical origins while requireProductionOrigin is true."
      - "Production launch/indexability remains blocked until the real production origin replaces the placeholder in committed config."
  robots_environment_mapping:
    source_order:
      - "VERCEL_ENV"
      - "NODE_ENV"
    mapping:
      - "VERCEL_ENV=production -> production"
      - "VERCEL_ENV=preview -> staging"
      - "VERCEL_ENV=development -> local"
      - "no VERCEL_ENV and NODE_ENV=development/test/unset -> local"
      - "no VERCEL_ENV and NODE_ENV=production -> staging fail-closed"
      - "unknown VERCEL_ENV -> staging fail-closed"
    notes:
      - "Do not introduce a new deployment environment variable in M5.4."
  sitemap_route_families:
    include:
      - "supported locale homepages"
      - "active configured categories with active synced database rows for each supported locale"
      - "public article detail URLs for supported locales"
    exclude:
      - "redirect-only root /"
      - "internal editorial routes"
      - "archive"
      - "structured data endpoints"
      - "unimplemented route families"
      - "draft/review/ready/failed/unpublished/null-published-at/inactive-category/incomplete/invalid/ambiguous article URLs"
  article_url_eligibility:
    decision: "Extract or reuse worker-only M5.3 public article detail eligibility helpers; do not independently mirror slug/fallback logic unless extraction is blocked and documented."
    notes:
      - "A sitemap article URL is eligible only if its candidate slug resolves back to the same public article under the M5.3 detail route contract."
      - "Invalid, incomplete, ambiguous, or different-article slug candidates must be omitted."
  implementation_library:
    decision: "Use native Next.js App Router metadata routes, not next-sitemap."
    rationale: "next-sitemap does not reduce the main M5.4 risks enough to justify a dependency because origin policy, robots mapping, DB-backed inventory, and M5.3 slug eligibility remain project-owned."

