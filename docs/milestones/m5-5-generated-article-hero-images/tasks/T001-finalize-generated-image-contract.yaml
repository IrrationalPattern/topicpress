acceptance_criteria:
  - "Milestone plan includes goal, non-goals, current state, desired state, architecture impact, contracts, task breakdown, dependencies, parallelization plan, risks, validation commands, QA gates, and acceptance criteria."
  - "Task graph includes owners, statuses, dependencies, blockers, write scopes, validation expectations, and sequencing."
  - "All eight task YAML files exist and are concrete enough for implementation agents."
  - "T001 is marked implemented and has a handoff."
  - "T002 and T003 are ready; downstream tasks are pending."
  - "ADR-007 records the OpenAI-only, one-current-image, review-time regeneration, single-public-bucket architecture."
  - "OpenAI docs evidence is paraphrased with official URLs and T003 is required to verify/pin `TOPICPRESS_OPENAI_IMAGE_MODEL` at implementation time."
  - "No app, package, database schema, migration, or Supabase implementation files are edited."
  - "Docs diff checks pass or failures are recorded in the handoff."

resolved_contract:
  provider:
    decision: "OpenAI only for MVP; no production fallback provider."
    model_policy: "T003 must verify official docs and account availability, then pin TOPICPRESS_OPENAI_IMAGE_MODEL, defaulting to gpt-image-1.5 if available."
  image_count:
    decision: "At most one current generated hero image per article."
  review_gate:
    decision: "Generated images are reviewed as part of article review; editors intentionally regenerate when needed."
  style:
    decision: "Editorial illustration, not fake photojournalism."
  storage:
    decision: "Single public Supabase Storage bucket: article-hero-images."
  public_pointer:
    decision: "articles.hero_image_url remains the public generated image pointer."
  data_model:
    decision: "Existing candidate table may be repurposed for one current-image metadata row per article."

validation:
  commands:
    - "git diff --check -- docs"
    - "rg --line-number \"[ \\t]+$\" docs/milestones/m5-5-generated-article-hero-images docs/architecture/adr/ADR-007-generated-article-hero-images.md docs/PROJECT_STATE.md"
  package_commands: []
  manual_checks:
    - "Review created task graph and task YAML files for dependency consistency."
    - "Review changed docs to confirm no code/package/db files were edited."

handoff:
